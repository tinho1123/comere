name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Upload projeto para Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "app/,bootstrap/,config/,database/,lang/,public/,resources/,routes/,artisan,composer.json,composer.lock"
          target: "/home/u968588512/domains/comere.com.br/comere/"

      - name: Run post-deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/domains/comere.com.br/comere

            echo "→ Instalando dependências PHP..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "→ Criando estrutura de diretórios..."
            mkdir -p public/storage/store storage/framework/cache storage/framework/sessions storage/framework/views storage/logs

            echo "→ Executando migrations..."
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache